<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <input type="text" placeholder="Search an Category" id="Search" onchange="onSearch(this.value)">
        <button  id="btn-1">Search</button>
        <a href="loginpage.html">Login</a>
        <button type="button" id="sign-up">sign-up</button>
    </div> 
    <div class="account-section">
        <button id="account-btn" style="width: 2rem; height: 2rem; border-radius: 50%; overflow: hidden; background-image: url('https://upload.wikimedia.org/wikipedia/commons/a/ac/Default_pfp.jpg'); background-size: cover;"></button>
        </div>
    <div class="account-info">
        <button type="button" id="my-account">My Account</button><br><br>
        <button type="button" id="my-orders">My Orders</button><br><br>
        <button type="button" id="my-reviews">My Reviews</button><br><br>
        <button type="button" id="logout">Logout</button>
  
        
        
    </div>
    <div class="category-btns">
        <button type="button" onclick="checkAuth('food')" >Food</button>
        <button type="button" onclick="checkAuth('home')" >Home</button>
        <button type="button" onclick="checkAuth('health')">Health</button>
        <button type="button" onclick="checkAuth('hotels')">Hotels</button>
    </div>
    <div class="itemsFilter" style="display: none;" >
        <select id="Order" onchange="filterbyItems()">
            <option value="" >Select New or Old Items</option>
            <option value="New" >New</option>
            <option value="Old">Old</option>
        </select><br><br>
        <label for="filter">Select the category Now </label><br>
        <input type="radio"  name="filter" value="food" onchange="filterbyItems(this.value)">
        <label for="food">Food</label><br>

        <input type="radio"  name="filter" value="home" onchange="filterbyItems(this.value)">
        <label for="home">Home</label><br>

        <input type="radio" name="filter" value="health" onchange="filterbyItems(this.value)">
        <label for="health">Health</label><br>

        <input type="radio"  name="filter" value="hotels" onchange="filterbyItems(this.value)">
        <label for="hotels">Hotels</label>
    </div>
    <div class="range-filters" style="display: none;">
        <label for="PriceRange">PriceRange:- <span id="priceValue">0$</span></label>
        <input type="range" id="PriceRange" min="1" max="1000" step="1" value="0" oninput="priceAndrating(this.value)"><br>
        <label for="ratingRange">Rating:- <span id="ratingValue">0</span></label>
        <input type="range" id="ratingRange" min="0" max="5" step="0.1" value="0" oninput="priceAndrating(this.value)">
    </div>
    <div class="container">

    </div>
    <div id="display-section">

    </div>
    <script  src="main.js"></script>
</body>
</html>
